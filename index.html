<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💖 Happy New Year 2083 Sweetheart 💖</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{min-height:100vh;background:linear-gradient(145deg,#ffe6f0,#ffd4e5);font-family:'Segoe UI',system-ui;display:flex;align-items:center;justify-content:center;padding:1rem;}
        .card{max-width:600px;width:100%;background:rgba(255,248,250,0.9);backdrop-filter:blur(14px);border-radius:2.5rem;padding:1.5rem;text-align:center;box-shadow:0 20px 40px rgba(255,105,180,0.2);}
        h1{font-size:2rem;background:linear-gradient(135deg,#dd5a82,#ff8c94);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:0.5rem;}
        .sub{font-size:0.8rem;background:#ffe2ed;display:inline-block;padding:0.3rem 1rem;border-radius:40px;color:#b34e71;}
        .countdown-box{background:rgba(255,240,245,0.8);border-radius:1.5rem;padding:0.8rem;margin:1rem 0;}
        .timer{display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;}
        .time-card{background:white;border-radius:1rem;padding:0.3rem 0.5rem;min-width:55px;}
        .time-number{font-size:1.5rem;font-weight:800;color:#e85d8b;}
        .time-label{font-size:0.6rem;color:#b57294;}
        .hug-btn{background:linear-gradient(125deg,#ffa0b0,#ffcdc0);border:none;padding:0.8rem 1.5rem;margin:0.5rem 0;border-radius:3rem;font-size:1.3rem;font-weight:bold;color:white;cursor:pointer;width:100%;max-width:280px;animation:pulse 1.5s infinite;}
        @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.02);}}
        .fun-buttons{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin:0.8rem 0;}
        .fun-btn{background:#ffe0ec;border:none;border-radius:2rem;padding:0.4rem 1rem;font-weight:bold;color:#b64d70;cursor:pointer;font-size:0.8rem;}
        .magic-box{background:#fff0f5;border-radius:1.5rem;padding:0.6rem;margin:0.8rem 0;display:flex;justify-content:space-between;align-items:center;gap:0.5rem;flex-wrap:wrap;}
        .magic-text{font-size:0.8rem;color:#aa6f89;flex:1;}
        .magic-btn{background:#ffc0d0;border:none;padding:0.3rem 0.8rem;border-radius:2rem;font-weight:bold;color:#a13e60;cursor:pointer;}
        .message-area{background:#ffeef4;border-radius:1.5rem;padding:0.8rem;margin:0.8rem 0;font-size:0.8rem;font-weight:600;color:#b85778;min-height:60px;display:flex;align-items:center;justify-content:center;}
        .moving-buddy{position:fixed;bottom:15px;right:15px;font-size:2.5rem;cursor:pointer;animation:bounce 1s infinite;z-index:999;}
        @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
        .floating-emoji{position:fixed;pointer-events:none;z-index:9999;font-size:1.8rem;animation:floatUp 1s forwards;}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(0.6);}100%{opacity:0;transform:translateY(-80px) scale(1.1);}}
        footer{font-size:0.6rem;color:#b47b97;margin-top:0.8rem;}
        @media (max-width:500px){.card{padding:1rem;}h1{font-size:1.5rem;}.time-number{font-size:1.2rem;}.hug-btn{font-size:1.1rem;}}
    </style>
</head>
<body>
<div class="card">
    <h1 id="mainTitle">✨ Happy New Year<br>Sweetheart ✨</h1>
    <div class="sub" id="subText">one hug = 2083 begins</div>
    <div class="countdown-box">
        <div>⏳ countdown to Nepali New Year 2083 (GMT+5:45) ⏳</div>
        <div class="timer" id="timerContainer">
            <div class="time-card"><div class="time-number" id="days">00</div><div class="time-label">days</div></div>
            <div class="time-card"><div class="time-number" id="hours">00</div><div class="time-label">hours</div></div>
            <div class="time-card"><div class="time-number" id="minutes">00</div><div class="time-label">mins</div></div>
            <div class="time-card"><div class="time-number" id="seconds">00</div><div class="time-label">secs</div></div>
        </div>
    </div>
    <button class="hug-btn" id="hugButton">🤗 GIVE A HUG → 2083 🤗</button>
    <div class="fun-buttons">
        <button class="fun-btn" id="starShowerBtn">✨ STAR SHOWER</button>
        <button class="fun-btn" id="danceBtn">🕺 DANCE PARTY</button>
        <button class="fun-btn" id="cuddleBlastBtn">🤗 CUDDLE BLAST</button>
    </div>
    <div class="magic-box">
        <span class="magic-text" id="magicMessage">✨ ask for a sweet surprise ✨</span>
        <button class="magic-btn" id="magicBtn">🔮 wish</button>
    </div>
    <div class="message-area" id="messageBox"><span>🌸 hug me → 2083 magic! tap anywhere for hearts 🌸</span></div>
    <footer>💖 tap anywhere → hearts | click the moving buddy 💖</footer>
</div>
<div class="moving-buddy" id="movingBuddy">💗🥰💗</div>
<script>
    function createFloater(x,y,emoji){let el=document.createElement('div');el.classList.add('floating-emoji');el.innerHTML=emoji;el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
    const emojis=['❤️','💖','🌸','✨','💗','🤗','💘','🥰'];
    document.addEventListener('click',(e)=>{const rand=emojis[Math.floor(Math.random()*emojis.length)];createFloater(e.clientX,e.clientY,rand);});
    let celebrationTriggered=false;
    
    // NEPAL TIMEZONE (GMT+5:45) FIX
    function getNepalTime() {
        // Get current time in Nepal (GMT+5:45)
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (345 * 60000)); // GMT+5:45 = 345 minutes
    }
    
    function getTargetNepalTime() {
        // Target: April 14, 2026, 00:00:00 Nepal Time
        // Create date in Nepal timezone
        const target = new Date(2026, 3, 14, 0, 0, 0, 0); // April 14, 2026
        // Adjust to Nepal timezone offset
        const utcTarget = target.getTime() - (target.getTimezoneOffset() * 60000);
        return new Date(utcTarget + (345 * 60000));
    }
    
    function updateCountdown(){
        if(celebrationTriggered) return;
        const nowNepal = getNepalTime();
        const targetNepal = getTargetNepalTime();
        const diff = targetNepal - nowNepal;
        
        if(diff <= 0){
            celebrate2083();
            return;
        }
        const total = Math.floor(diff / 1000);
        const days = Math.floor(total / 86400);
        const hours = Math.floor((total % 86400) / 3600);
        const minutes = Math.floor((total % 3600) / 60);
        const seconds = total % 60;
        
        document.getElementById('days').innerText = days < 10 ? '0' + days : days;
        document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
        document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
        document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
    }
    
    function celebrate2083(){
        if(celebrationTriggered) return;
        celebrationTriggered = true;
        document.getElementById('mainTitle').innerHTML = '🎉 Happy New Year 2083, Sweetheart! 🎉';
        document.getElementById('subText').innerHTML = '🌸 नेपाली नयाँ वर्ष २०८३ को शुभकामना 🌸';
        document.getElementById('timerContainer').innerHTML = '<div style="padding:0.5rem; font-size:1.5rem;">🎊 २०८३ 🎊</div>';
        canvasConfetti({particleCount:300,spread:100,origin:{y:0.6}});
        canvasConfetti({particleCount:150,spread:80,origin:{y:0.4,x:0.2}});
        canvasConfetti({particleCount:150,spread:80,origin:{y:0.4,x:0.8}});
        for(let i=0;i<40;i++) setTimeout(()=>createFloater(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'💖'),i*50);
        const hugBtn=document.getElementById('hugButton');
        hugBtn.innerHTML='💖 2083 FOREVER 💖';
        hugBtn.disabled=true;
        hugBtn.style.opacity='0.7';
        document.getElementById('messageBox').innerHTML = '<span>🎉✨ नयाँ वर्ष २०८३ को हार्दिक शुभकामना! ✨🎉</span>';
    }
    
    setInterval(updateCountdown, 1000);
    updateCountdown();
    
    document.getElementById('hugButton').addEventListener('click',()=>{if(!celebrationTriggered)celebrate2083();});
    
    document.getElementById('starShowerBtn').addEventListener('click',()=>{for(let i=0;i<30;i++)setTimeout(()=>createFloater(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'⭐'),i*40);canvasConfetti({particleCount:100,spread:80,colors:['#ffd700']});document.getElementById('messageBox').innerHTML='<span>⭐✨ star shower just for you! ✨⭐</span>';setTimeout(()=>document.getElementById('messageBox').innerHTML='<span>🌸 keep celebrating! 🌸</span>',2000);});
    
    document.getElementById('danceBtn').addEventListener('click',()=>{document.querySelector('.card').style.transform='rotate(1deg)';setTimeout(()=>document.querySelector('.card').style.transform='',200);for(let i=0;i<20;i++)setTimeout(()=>createFloater(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'🕺'),i*50);canvasConfetti({particleCount:80,spread:70});document.getElementById('messageBox').innerHTML='<span>💃🕺 dance party! you\'re my rhythm 🎶</span>';setTimeout(()=>document.getElementById('messageBox').innerHTML='<span>💖 party never stops! 💖</span>',2000);});
    
    document.getElementById('cuddleBlastBtn').addEventListener('click',()=>{for(let i=0;i<25;i++)setTimeout(()=>createFloater(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'🤗'),i*40);canvasConfetti({particleCount:120,spread:90});document.getElementById('messageBox').innerHTML='<span>🤗💥 CUDDLE BLAST! wrapping you in hugs 💥🤗</span>';setTimeout(()=>document.getElementById('messageBox').innerHTML='<span>💗 cuddle party forever! 💗</span>',2000);});
    
    const magicMsgs=['💫 you make me sparkle','🌸 every hug is a miracle','💖 2083 is our year','🤗 sending you a thousand hugs','⭐ you are my dream come true','🎀 our love shines brighter than fireworks','🇳🇵 नयाँ वर्ष २०८३ को शुभकामना 🇳🇵'];
    document.getElementById('magicBtn').addEventListener('click',()=>{const msg=magicMsgs[Math.floor(Math.random()*magicMsgs.length)];document.getElementById('magicMessage').innerHTML=msg;for(let i=0;i<8;i++)setTimeout(()=>createFloater(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'💖'),i*60);setTimeout(()=>document.getElementById('magicMessage').innerHTML='✨ ask for a sweet surprise ✨',2000);});
    
    document.getElementById('movingBuddy').addEventListener('click',()=>{for(let i=0;i<12;i++)setTimeout(()=>createFloater(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'🥰'),i*50);canvasConfetti({particleCount:50,spread:50});document.getElementById('messageBox').innerHTML='<span>🥰 my heart dances when you\'re near 🥰</span>';setTimeout(()=>document.getElementById('messageBox').innerHTML='<span>💗 you + me = 2083 magic 💗</span>',2000);});
</script>
</body>
</html>
